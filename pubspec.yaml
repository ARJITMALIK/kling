name: cling
description: "A couples game app — Clash Royale meets relationship tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # HTTP & WebSocket
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Device Features
  battery_plus: ^6.0.3
  geolocator: ^13.0.2
  permission_handler: ^11.3.0

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Utilities
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.1.4
  home_widget: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
